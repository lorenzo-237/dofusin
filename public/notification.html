<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>DofusIn</title>
    <style>
      :root {
        --background: #fbf6ec;
        --foreground: #2e2a22;
        --card: #ffffff;
        --primary: #3f7a54;
        --muted-foreground: #8a8271;
        --border: #e4d9be;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --background: #211f19;
          --foreground: #f5efdd;
          --card: #2a281f;
          --primary: #5fa377;
          --muted-foreground: #a79c86;
          --border: #3a3527;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 28px 14px 16px;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--foreground);
        font-family:
          "Segoe UI",
          system-ui,
          sans-serif;
        cursor: pointer;
        user-select: none;
        overflow: hidden;
      }
      .icon {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        border-radius: 8px;
      }
      .text {
        min-width: 0;
      }
      .close-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        padding: 0;
        border: none;
        border-radius: 4px;
        background: transparent;
        color: var(--muted-foreground);
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
      }
      .close-btn:hover {
        background: var(--border);
        color: var(--foreground);
      }
      .title {
        font-size: 13px;
        font-weight: 700;
        color: var(--primary);
        margin: 0 0 2px;
      }
      .body {
        font-size: 12.5px;
        color: var(--foreground);
        margin: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
    </style>
  </head>
  <body>
    <img class="icon" src="/assets/icon.svg" alt="" />
    <div class="text">
      <p class="title" id="title">DofusIn</p>
      <p class="body" id="body"></p>
    </div>
    <button class="close-btn" id="close-btn" type="button" aria-label="Fermer">
      &times;
    </button>
    <script>
      // Standalone page, no bundler — relies on withGlobalTauri (see
      // tauri.conf.json) instead of the @tauri-apps/api package import used
      // everywhere else, since this window is opened directly with this
      // static file as its URL rather than going through the SPA/router.
      ;(function () {
        var params = new URLSearchParams(location.search)
        document.getElementById("title").textContent =
          params.get("title") || "DofusIn"
        document.getElementById("body").textContent = params.get("body") || ""

        var tauriWindow = window.__TAURI__ && window.__TAURI__.window
        var tauriEvent = window.__TAURI__ && window.__TAURI__.event
        if (!tauriWindow) return

        var autoCloseTimer

        function closeSelf() {
          clearTimeout(autoCloseTimer)
          tauriWindow
            .getCurrentWindow()
            .close()
            .catch(function () {})
        }

        function focusMain() {
          // Lets auth-context.tsx's listener (main window) navigate to the
          // right /help-requests tab for whatever event triggered this
          // popup — the popup itself is a separate JS context/window, so
          // this is the only way to reach the router from here.
          if (tauriEvent) {
            tauriEvent
              .emit("notification-click", { tab: params.get("tab") || "" })
              .catch(function () {})
          }
          tauriWindow
            .getAllWindows()
            .then(function (windows) {
              var main = windows.find(function (w) {
                return w.label === "main"
              })
              if (!main) return
              return main
                .show()
                .then(function () {
                  return main.unminimize()
                })
                .then(function () {
                  return main.setFocus()
                })
            })
            .catch(function () {})
            .then(closeSelf)
        }

        document.body.addEventListener("click", focusMain)
        document
          .getElementById("close-btn")
          .addEventListener("click", function (event) {
            // Don't let this bubble to the body's own click handler
            // (focusMain) — dismissing shouldn't also focus the main window.
            event.stopPropagation()
            closeSelf()
          })
        autoCloseTimer = setTimeout(closeSelf, 6000)
      })()
    </script>
  </body>
</html>
